services:
  mysql:
    environment:
      - MYSQL_ROOT_PASSWORD=1234
    image: mysql:8.2.0
    container_name: mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - ./scripts/sql:/docker-entrypoint-initdb.d
    networks:
      - service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "mysql", "-u", "root", "--password=1234"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
  
networks:
  service-network:
    driver: bridge